# Render Blueprint for the WB Shturval backend (free web service).
# In Render: New → Blueprint → point at this repo. Then fill the env vars marked
# `sync: false` (DATABASE_URL, ENCRYPTION_KEY, CORS_ORIGIN) in the dashboard.
# See SETUP_GUIDE.md §20.11 for the full walkthrough.

services:
  - type: web
    name: wb-shturval-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # Supabase "Session pooler" connection string (port 5432). Paste in dashboard.
      - key: DATABASE_URL
        sync: false
      # 32-byte base64 key. Generate locally and paste (see SETUP_GUIDE §20.2).
      - key: ENCRYPTION_KEY
        sync: false
      # The Vercel site URL, e.g. https://your-app.vercel.app. Paste in dashboard.
      - key: CORS_ORIGIN
        sync: false
      # Render generates a strong random value automatically.
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      # Same-origin via the Vercel /api proxy → keep "lax". If the frontend calls
      # Render directly (cross-site), set this to "none" instead.
      - key: COOKIE_SAMESITE
        value: lax
