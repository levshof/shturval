# WB Shturval — local / single-host deployment.
# Copy .env.example to .env and fill the secrets before running:
#   docker compose up -d --build
# Then open http://localhost:8080

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wb}
      POSTGRES_DB: ${POSTGRES_DB:-wb_shturval}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wb} -d ${POSTGRES_DB:-wb_shturval}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wb}:${POSTGRES_PASSWORD:-wb}@db:5432/${POSTGRES_DB:-wb_shturval}?schema=public
      PORT: "4000"
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "4000:4000"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
